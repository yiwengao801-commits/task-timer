name: Build and Release Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release_info:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      name: ${{ steps.vars.outputs.name }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - name: Generate release info
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="$TAG"
            PRERELEASE=false
          else
            TAG="manual-${GITHUB_RUN_NUMBER}"
            NAME="manual-${GITHUB_RUN_NUMBER}"
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build:
    needs: release_info
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-build
          - os: macos-latest
            artifact_name: mac-build
          - os: ubuntu-latest
            artifact_name: linux-build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.zip
            release/**/*.blockmap
            release/**/*.yml
          if-no-files-found: ignore

  release:
    needs: [release_info, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List files
        run: find dist-artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_info.outputs.tag }}
          name: ${{ needs.release_info.outputs.name }}
          prerelease: ${{ needs.release_info.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.blockmap
            dist-artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
