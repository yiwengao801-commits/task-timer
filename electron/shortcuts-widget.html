<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortcuts Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      -webkit-app-region: drag;
    }

    .widget {
      width: 280px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: linear-gradient(135deg, #845ef7 0%, #7950f2 100%);
      color: white;
      -webkit-app-region: drag;
      min-height: 48px;
    }

    .widget-header.pinned {
      background: linear-gradient(135deg, #40c057 0%, #37b24d 100%);
    }

    .widget-title {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .widget-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .widget-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .widget-btn:hover { opacity: 0.85; }
    .btn-minimize { background: #fab005; color: white; }
    .btn-pin { background: #40c057; color: white; }
    .btn-manage { background: rgba(255,255,255,0.25); color: white; font-size: 11px; }
    .btn-close { background: #fa5252; color: white; }

    .widget-body {
      padding: 12px;
      -webkit-app-region: no-drag;
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .shortcut-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    .shortcut-item:hover { background: #f8f9fa; }

    .shortcut-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 6px;
      color: white;
    }

    .shortcut-name {
      font-size: 11px;
      color: #495057;
      text-align: center;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      padding: 18px 8px;
      text-align: center;
      color: #868e96;
      font-size: 12px;
    }

    /* 最小化状态 */
    .widget.minimized .widget-body { display: none; }
    .widget.minimized { height: 48px; }
    body.minimized { height: 48px; }
  </style>
</head>
<body id="body">
  <div class="widget" id="widget">
    <div class="widget-header" id="widget-header">
      <div class="widget-title">
        <span>🔗 快捷入口</span>
      </div>
      <div class="widget-controls">
        <button class="widget-btn btn-minimize" id="btn-minimize" title="最小化">—</button>
        <button class="widget-btn btn-pin" id="btn-pin" title="置顶">📌</button>
        <button class="widget-btn btn-manage" id="btn-manage" title="管理">⚙</button>
        <button class="widget-btn btn-close" id="btn-close" title="关闭">×</button>
      </div>
    </div>

    <div class="widget-body" id="widget-body">
      <div class="shortcuts-grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none;">暂无快捷入口，点右上角 ⚙ 去添加</div>
    </div>
  </div>

  <script>
    const widget = document.getElementById('widget')
    const widgetHeader = document.getElementById('widget-header')
    const grid = document.getElementById('grid')
    const empty = document.getElementById('empty')

    function normalizeUrl(url) {
      const trimmed = (url || '').trim()
      if (!trimmed) return ''
      if (/^https?:\/\//i.test(trimmed)) return trimmed
      return `https://${trimmed}`
    }

    function openLink(url) {
      const safeUrl = normalizeUrl(url)
      if (!safeUrl) return
      window.electronAPI.openExternal(safeUrl)
    }

    function render(shortcuts) {
      const list = Array.isArray(shortcuts) ? shortcuts.slice(0, 4) : []
      grid.innerHTML = ''
      if (list.length === 0) {
        empty.style.display = 'block'
        return
      }
      empty.style.display = 'none'
      list.forEach((s) => {
        const item = document.createElement('div')
        item.className = 'shortcut-item'
        item.title = s.url || ''
        item.addEventListener('click', () => openLink(s.url))

        const icon = document.createElement('div')
        icon.className = 'shortcut-icon'
        icon.style.background = s.color || s.bg || '#845ef7'
        icon.textContent = s.icon || '🔗'

        const name = document.createElement('div')
        name.className = 'shortcut-name'
        name.textContent = s.name || '未命名'

        item.appendChild(icon)
        item.appendChild(name)
        grid.appendChild(item)
      })
    }

    async function load() {
      try {
        const shortcuts = await window.electronAPI.getShortcuts()
        render(shortcuts)
      } catch (e) {
        render([])
      }
    }

    // 最小化
    let isMinimized = false
    document.getElementById('btn-minimize').addEventListener('click', () => {
      isMinimized = !isMinimized
      widget.classList.toggle('minimized', isMinimized)
      document.getElementById('body').classList.toggle('minimized', isMinimized)
      document.getElementById('btn-minimize').textContent = isMinimized ? '□' : '—'
      window.electronAPI.resize(isMinimized)
    })

    // 置顶
    document.getElementById('btn-pin').addEventListener('click', () => {
      window.electronAPI.togglePin()
    })
    window.electronAPI.onPinStatus((pinned) => {
      widgetHeader.classList.toggle('pinned', pinned)
    })

    // 管理（打开主窗口里的管理弹窗）
    document.getElementById('btn-manage').addEventListener('click', () => {
      window.electronAPI.openShortcutsManager()
    })

    // 关闭
    document.getElementById('btn-close').addEventListener('click', () => {
      window.electronAPI.close()
    })

    // 接收更新
    window.electronAPI.onShortcutsUpdated(() => load())

    // 初始化
    load()
  </script>
</body>
</html>
